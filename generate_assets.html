<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏀 Basketball Level Assets Generator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      padding: 20px;
      background: #0f172a;
      color: #e5e7eb;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      font-size: 32px;
      margin-bottom: 10px;
    }
    .instructions {
      text-align: center;
      color: #9ca3af;
      margin-bottom: 30px;
      font-size: 16px;
    }
    .button-group {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(180deg, #f97316, #ea5a0c);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    .preview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 25px;
      margin-bottom: 30px;
    }
    .card-preview {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      padding: 15px;
      text-align: center;
    }
    .card-preview canvas {
      width: 100%;
      max-width: 300px;
      border-radius: 12px;
      background: #1e293b;
      display: block;
      margin: 0 auto;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    .card-preview p {
      margin: 15px 0 0 0;
      font-size: 14px;
      color: #cbd5e1;
      font-weight: 600;
    }
    .status {
      margin-top: 30px;
      padding: 20px;
      border-radius: 12px;
      background: #1e293b;
      border-left: 4px solid #fbbf24;
      text-align: center;
      font-size: 16px;
    }
    .status.success {
      background: rgba(16, 185, 129, 0.1);
      border-left-color: #10b981;
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏀 Level Selection Assets Generator</h1>
    <div class="instructions">
      <p>Click "Download All" to generate and download all 4 level card images for your basketball game.</p>
      <p style="color: #6b7280; margin-top: 5px;">The files will be saved to your Downloads folder as: Asset_1.png, Asset_3.png, Asset_4.png, Asset_6.png</p>
    </div>
    
    <div class="button-group">
      <button onclick="downloadAllAssets()">⬇️ Download All Assets (One Click!)</button>
      <button onclick="downloadSingle('Asset_1')">Asset 1 (Easy)</button>
      <button onclick="downloadSingle('Asset_3')">Asset 3 (Hard)</button>
      <button onclick="downloadSingle('Asset_4')">Asset 4 (Insane)</button>
      <button onclick="downloadSingle('Asset_6')">Asset 6 (Legendary)</button>
    </div>

    <div id="preview" class="preview"></div>
    <div class="status" id="status" style="display:none;">Ready to download!</div>
  </div>

  <script>
    const levels = {
      'Asset_1': { title: 'EASY', color: '#4ADE80', difficulty: 'Beginner', description: 'Static Rim' },
      'Asset_3': { title: 'HARD', color: '#FBBF24', difficulty: 'Intermediate', description: 'Moving Rim' },
      'Asset_4': { title: 'INSANE', color: '#EF4444', difficulty: 'Expert', description: 'Fast Moving Rim' },
      'Asset_6': { title: 'LEGENDARY', color: '#A78BFA', difficulty: 'Master', description: 'Ultra Speed' }
    };

    function drawLevelCard(canvas, levelData) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;

      // Background
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, w, h);

      // Top gradient border
      const grad = ctx.createLinearGradient(0, 0, 0, 25);
      grad.addColorStop(0, levelData.color);
      grad.addColorStop(1, 'rgba(15, 23, 42, 0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, 25);

      // Border
      ctx.strokeStyle = levelData.color;
      ctx.lineWidth = 2;
      ctx.strokeRect(2, 2, w - 4, h - 4);

      // Emoji
      ctx.font = 'bold 70px Arial';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('🏀', w / 2, 85);

      // Title
      ctx.font = 'bold 52px Arial';
      ctx.fillStyle = levelData.color;
      ctx.fillText(levelData.title, w / 2, 155);

      // Difficulty
      ctx.font = 'bold 34px Arial';
      ctx.fillStyle = '#e5e7eb';
      ctx.fillText(levelData.difficulty, w / 2, 230);

      // Description
      ctx.font = '18px Arial';
      ctx.fillStyle = '#9ca3af';
      ctx.fillText(levelData.description, w / 2, 280);

      // Tap hint
      ctx.font = '14px Arial';
      ctx.fillStyle = levelData.color;
      ctx.globalAlpha = 0.7;
      ctx.fillText('TAP TO START', w / 2, 360);
      ctx.globalAlpha = 1;
    }

    function generatePreviews() {
      const preview = document.getElementById('preview');
      preview.innerHTML = '';

      Object.entries(levels).forEach(([filename, levelData]) => {
        const div = document.createElement('div');
        div.className = 'card-preview';

        const canvas = document.createElement('canvas');
        canvas.width = 300;
        canvas.height = 400;
        drawLevelCard(canvas, levelData);

        div.appendChild(canvas);

        const p = document.createElement('p');
        p.textContent = filename + '.png';
        div.appendChild(p);

        preview.appendChild(div);
      });
    }

    function downloadSingle(filename) {
      const levelData = levels[filename];
      const canvas = document.createElement('canvas');
      canvas.width = 300;
      canvas.height = 400;
      drawLevelCard(canvas, levelData);

      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename + '.png';
        a.click();
        URL.revokeObjectURL(url);
      });
    }

    function downloadAllAssets() {
      const status = document.getElementById('status');
      status.textContent = '⬇️ Downloading 4 assets...';
      status.style.display = 'block';
      status.className = 'status';

      let count = 0;
      const filenames = Object.keys(levels);

      filenames.forEach((filename, index) => {
        setTimeout(() => {
          downloadSingle(filename);
          count++;
          if (count === filenames.length) {
            setTimeout(() => {
              status.textContent = '✅ All assets downloaded! Move them to your game folder: Basketball-game-vibe-game-coding';
              status.className = 'status success';
            }, 300);
          }
        }, index * 400);
      });
    }

    window.addEventListener('load', generatePreviews);
  </script>
</body>
</html>
